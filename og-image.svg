<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg1" cx="30%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#3730a3" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f0f1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0f0f1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="#0f0f1a"/>
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- 도트 패턴 -->
  <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- 배지 -->
  <rect x="80" y="100" width="200" height="38" rx="19" fill="url(#textGrad)" fill-opacity="0.9"/>
  <text x="180" y="124" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">🎓 대학 1학년 한정</text>

  <!-- 메인 타이틀 -->
  <text x="80" y="230" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="#f1f5f9">MBTI · 혈액형</text>
  <text x="80" y="320" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="url(#textGrad)">대학생활 필승 공략집</text>

  <!-- 서브 텍스트 -->
  <text x="80" y="390" font-family="Arial, sans-serif" font-size="28" fill="#94a3b8">나의 성향에 딱 맞는 대학생활 전략 + 역량 멘토 연결</text>

  <!-- 태그들 -->
  <rect x="80" y="440" width="130" height="44" rx="10" fill="#1a1a2e" stroke="#4f46e5" stroke-width="2"/>
  <text x="145" y="468" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#a5b4fc" text-anchor="middle">16가지 MBTI</text>

  <rect x="226" y="440" width="120" height="44" rx="10" fill="#1a1a2e" stroke="#4f46e5" stroke-width="2"/>
  <text x="286" y="468" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#a5b4fc" text-anchor="middle">4가지 혈액형</text>

  <rect x="362" y="440" width="150" height="44" rx="10" fill="#1a1a2e" stroke="#10b981" stroke-width="2"/>
  <text x="437" y="468" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#6ee7b7" text-anchor="middle">10가지 역량</text>

  <!-- 우측 이모지 장식 -->
  <text x="950" y="280" font-size="180" text-anchor="middle">🎓</text>
  <text x="1100" y="420" font-size="90" text-anchor="middle">✨</text>
  <text x="840" y="420" font-size="70" text-anchor="middle">🧠</text>
</svg>
